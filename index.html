<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NOVEL-FREE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0f1012; color: #e1e1e1; margin: 0; }
        .pink-gradient { background: linear-gradient(135deg, #ff4e84 0%, #ff8ab3 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); }
        input, textarea { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const App = () => {
            const [view, setView] = useState('home'); // home, write, viewer
            const [novels, setNovels] = useState([]);
            const [selectedNovel, setSelectedNovel] = useState(null);
            
            // 입력 폼 상태
            const [title, setTitle] = useState('');
            const [content, setContent] = useState('');
            const [cover, setCover] = useState(null);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [view, novels]);

            // 이미지 업로드 핸들러
            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setCover(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            // 글 저장하기
            const handleSave = () => {
                if (!title || !content) return alert('제목과 내용을 입력해주세요!');
                const newNovel = { id: Date.now(), title, content, cover, date: new Date().toLocaleDateString() };
                setNovels([newNovel, ...novels]);
                setTitle(''); setContent(''); setCover(null);
                setView('home');
            };

            // 1. 작성 화면
            if (view === 'write') return (
                <div className="min-h-screen p-6 max-w-[500px] mx-auto">
                    <header className="flex justify-between items-center mb-8 pt-4">
                        <button onClick={() => setView('home')} className="opacity-60"><i data-lucide="x"></i></button>
                        <h2 className="font-bold text-lg">새 작품 쓰기</h2>
                        <button onClick={handleSave} className="text-[#ff4e84] font-bold">완료</button>
                    </header>
                    
                    <div className="space-y-6">
                        <div className="relative w-full aspect-[3/4] glass rounded-[32px] overflow-hidden flex flex-col items-center justify-center border-dashed border-2 border-white/10">
                            {cover ? (
                                <img src={cover} className="w-full h-full object-cover" />
                            ) : (
                                <>
                                    <i data-lucide="image" className="opacity-20 mb-2" size="48"></i>
                                    <p className="text-xs opacity-40">표지/삽화 추가</p>
                                </>
                            )}
                            <input type="file" onChange={handleImageChange} className="absolute inset-0 opacity-0 cursor-pointer" />
                        </div>
                        <input type="text" placeholder="제목을 입력하세요" value={title} onChange={(e) => setTitle(e.target.value)} className="w-full p-4 rounded-2xl font-bold text-xl outline-none" />
                        <textarea placeholder="당신의 이야기를 시작해보세요..." value={content} onChange={(e) => setContent(e.target.value)} className="w-full p-4 rounded-2xl h-[300px] outline-none resize-none leading-relaxed"></textarea>
                    </div>
                </div>
            );

            // 2. 뷰어 화면
            if (view === 'viewer') return (
                <div className="min-h-screen bg-[#0f1012] p-6 pb-20 max-w-[500px] mx-auto">
                    <button onClick={() => setView('home')} className="mb-6 opacity-60 pt-4"><i data-lucide="arrow-left"></i></button>
                    {selectedNovel.cover && <img src={selectedNovel.cover} className="w-full rounded-[32px] mb-8 shadow-2xl" />}
                    <h1 className="text-3xl font-black mb-6 tracking-tight">{selectedNovel.title}</h1>
                    <div className="leading-loose text-lg opacity-80 whitespace-pre-wrap">{selectedNovel.content}</div>
                </div>
            );

            // 3. 메인 홈 화면
            return (
                <div className="min-h-screen max-w-[500px] mx-auto pb-24">
                    <header className="p-6 pt-12 flex justify-between items-center">
                        <h1 className="text-2xl font-black italic text-[#ff4e84]">NOVEL-FREE</h1>
                        <button onClick={() => setView('write')} className="pink-gradient px-4 py-2 rounded-full text-xs font-bold text-white shadow-lg shadow-pink-500/30">+ 새 글 쓰기</button>
                    </header>
                    
                    <main className="px-6">
                        {novels.length === 0 ? (
                            <div className="mt-20 text-center opacity-30">
                                <i data-lucide="pen-tool" className="mx-auto mb-4" size="40"></i>
                                <p>작성된 소설이 없습니다.<br/>첫 번째 작품을 써보세요!</p>
                            </div>
                        ) : (
                            <div className="grid gap-6">
                                {novels.map(novel => (
                                    <div key={novel.id} onClick={() => { setSelectedNovel(novel); setView('viewer'); }} className="glass rounded-[32px] overflow-hidden active:scale-[0.98] transition-all">
                                        {novel.cover && <img src={novel.cover} className="w-full h-48 object-cover opacity-60" />}
                                        <div className="p-6">
                                            <h4 className="font-bold text-xl mb-1">{novel.title}</h4>
                                            <p className="text-[10px] opacity-40 uppercase font-bold tracking-widest">{novel.date}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-[400px] glass p-4 px-10 flex justify-around items-center rounded-full">
                        <i data-lucide="home" className="text-[#ff4e84]"></i>
                        <i data-lucide="book" className="opacity-20" onClick={() => setView('home')}></i>
                        <i data-lucide="user" className="opacity-20"></i>
                    </nav>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
