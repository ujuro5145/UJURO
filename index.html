<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Archive</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; margin: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 1rem; overflow: hidden; }
        input, textarea { background: transparent; border: none; outline: none; color: white; width: 100%; }
        .content-img { width: 100%; border-radius: 0.75rem; margin: 1.5rem 0; shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('home');
            const [data, setData] = useState(() => JSON.parse(localStorage.getItem('archive_final_v2') || '[]'));
            const [activeId, setActiveId] = useState(null);
            const [activeEpIdx, setActiveEpIdx] = useState(null);

            const [f, setF] = useState({ t: '', c: null });
            const [e, setE] = useState({ t: '', b: '', imgs: [] });

            useEffect(() => {
                localStorage.setItem('archive_final_v2', JSON.stringify(data));
                if (window.lucide) window.lucide.createIcons();
            }, [data, view]);

            const cur = data.find(i => i.id === activeId);
            const curEp = cur?.eps[activeEpIdx];

            // 삽화 추가 핸들러
            const addIllustration = (ev) => {
                const file = ev.target.files[0];
                if (!file) return;
                const r = new FileReader();
                r.onload = _ => {
                    const imgId = `[IMG_${Date.now()}]`;
                    setE({
                        ...e,
                        b: e.b + `\n${imgId}\n`,
                        imgs: [...(e.imgs || []), { id: imgId, data: _.target.result }]
                    });
                };
                r.readAsDataURL(file);
            };

            // 홈 화면
            if (view === 'home') return (
                <div className="p-6 max-w-md mx-auto">
                    <div className="flex justify-between items-center mb-10">
                        <h1 className="text-xl font-black tracking-widest text-indigo-400">ARCHIVE</h1>
                        <button onClick={() => setView('add')} className="bg-indigo-600 px-4 py-2 rounded-full text-xs font-bold shadow-lg shadow-indigo-500/20">+ NEW STORY</button>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        {data.map(i => (
                            <div key={i.id} onClick={() => { setActiveId(i.id); setView('list'); }} className="active:scale-95 transition-transform">
                                <div className="aspect-[3/4] card mb-2 shadow-xl">{i.c && <img src={i.c} className="w-full h-full object-cover" />}</div>
                                <div className="text-sm font-bold truncate px-1">{i.t}</div>
                            </div>
                        ))}
                    </div>
