
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Archive</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #020617; color: #f1f5f9; margin: 0; font-family: system-ui; -webkit-tap-highlight-color: transparent; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 1rem; overflow: hidden; position: relative; }
        input, textarea { background: transparent; border: none; outline: none; color: white; width: 100%; }
        .content-img { width: 100%; border-radius: 1rem; margin: 1.5rem 0; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('home');
            const [data, setData] = useState(() => JSON.parse(localStorage.getItem('archive_final_v6') || '[]'));
            const [activeId, setActiveId] = useState(null);
            const [activeEpIdx, setActiveEpIdx] = useState(null);

            const [f, setF] = useState({ t: '', c: null }); // 작품 등록/수정용
            const [e, setE] = useState({ t: '', b: '', imgs: [] }); // 회차 작성용

            useEffect(() => {
                localStorage.setItem('archive_final_v6', JSON.stringify(data));
                if (window.lucide) window.lucide.createIcons();
            }, [data, view]);

            const cur = data.find(i => i.id === activeId);
            const curEp = cur?.eps ? cur.eps[activeEpIdx] : null;

            // 이미지 처리 함수 (공통)
            const handleImage = (file, callback) => {
                const reader = new FileReader();
                reader.onload = (ev) => callback(ev.target.result);
                reader.readAsDataURL(file);
            };

            // 1. 홈 화면
            if (view === 'home') return (
                <div className="p-6 max-w-md mx-auto min-h-screen">
                    <header className="flex justify-between items-center mb-10 pt-4">
                        <h1 className="text-xl font-black text-blue-500 italic">ARCHIVE</h1>
                        <button onClick={() => { setF({t:'', c:null}); setView('add'); }} className="bg-blue-600 px-5 py-2 rounded-full text-xs font-bold shadow-lg">+ 신규</button>
                    </header>
                    <div className="grid grid-cols-2 gap-5">
                        {data.map(i => (
                            <div key={i.id} onClick={() => { setActiveId(i.id); setView('list'); }}>
                                <div className="aspect-[3/4] card mb-2 shadow-xl">
                                    {i.c ? <img src={i.c} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center opacity-10 font-bold text-xs text-center p-2">표지 없음</div>}
                                </div>
                                <div className="text-xs font-bold truncate opacity-80 text-center">{i.t}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // 2. 작품 등록 및 수정
            if (view === 'add' || view === 'edit') return (
                <div className="p-6 max-w-md mx-auto">
                    <button onClick={() => setView(view === 'edit' ? 'list' : 'home')} className="mb-10 opacity-30"><i data-lucide="arrow-left"></i></button>
                    <div className="w-40 aspect-[3/4] card mx-auto mb-10 flex items-center justify-center border-dashed border-white/20">
                        {f.c ? <img src={f.c} className="w-full h-full object-cover" /> : <i data-lucide="camera" className="opacity-20"></i>}
                        <input type="file" accept="image/*" onChange={(ev) => handleImage(ev.target.files[0], (res) => setF({...f, c: res}))} className="absolute inset-0 opacity-0" />
                    </div>
                    <input placeholder="제목을 입력하세요" value={f.t} onChange={ev => setF({...f, t: ev.target.value})} className="text-2xl border-b border-white/10 py-4 mb-10 font-black" />
                    
                    <div className="flex gap-3">
                        {view === 'edit' && (
                            <button onClick={() => {
                                if(confirm('정말 삭제하시겠습니까?')) {
                                    setData(data.filter(i => i.id !== activeId));
                                    setView('home');
                                }
                            }} className="flex-1 bg-red-900/30 text-red-500 py-4 rounded-2xl font-bold">삭제</button>
                        )}
                        <button onClick={() => {
                            if(!f.t) return;
                            if(view === 'edit') {
                                setData(data.map(i => i.id === activeId ? {...i, t: f.t, c: f.c} : i));
                                setView('list');
                            } else {
                                setData([{ id: Date.now(), ...f, eps: [] }, ...data]);
                                setView('home');
                            }
                        }} className="flex-[2] bg-blue-600 py-4 rounded-2xl font-bold shadow-xl">{view === 'edit' ? '수정 완료' : '생성하기'}</button>
                    </div>
                </div>
            );

            // 3. 회차 목록 (여기에서 수정 버튼 등장)
            if (view === 'list' && cur) return (
                <div className="max-w-md mx-auto min-h-screen">
                    <div className="p-6 flex gap-5 items-end bg-slate-900/80 backdrop-blur sticky top-0 z-10 border-b border-white/5">
                        <div className="w-20 aspect-[3/4] card shrink-0 shadow-2xl">{cur.c && <img src={cur.c} className="w-full h-full object-cover" />}</div>
                        <div className="flex-1 min-w-0">
                            <h2 className="text-xl font-black mb-4 truncate">{cur.t}</h2>
                            <div className="flex gap-2">
                                <button onClick={() => setView('home')} className="bg-white/5 px-3 py-2 rounded-lg text-xs font-bold border border-white/10">홈</button>
                                <button onClick={() => { setF({t: cur.t, c: cur.c}); setView('edit'); }} className="bg-white/10 px-3 py-2 rounded-lg text-xs font-bold">수정</button>
                                <button onClick={() => { setE({t:'', b:'', imgs:[]}); setView('write'); }} className="bg-blue-600 px-3 py-2 rounded-lg text-xs font-bold shadow-lg">작성</button>
                            </div>
                        </div>
                    </div>
                    <div className="p-6 space-y-3">
                        {cur.eps.map((ep, i) => (
                            <div key={ep.id} onClick={() => { setActiveEpIdx(i); setView('read'); }} className="card p-5 flex justify-between items-center active:bg-slate-700 transition-colors cursor-pointer">
                                <span className="font-bold text-slate-300">{i+1}. {ep.t}</span>
                                <i data-lucide="chevron-right" size="16" className="opacity-20"></i>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // 4. 회차 작성 (삽화 버튼 포함)
            if (view === 'write') return (
                <div className="p-6 max-w-md mx-auto min-h-screen">
                    <header className="flex justify-between items-center mb-8">
                        <button onClick={() => setView('list')} className="opacity-30"><i data-lucide="x"></i></button>
                        <div className="flex gap-4 items-center">
                            {/* 삽화 버튼 */}
                            <div className="relative bg-white/5 p-2 rounded-xl border border-white/10">
                                <i data-lucide="image" size="20" className="text-blue-400"></i>
                                <input type="file" accept="image/*" onChange={(ev) => handleImage(ev.target.files[0], (res) => {
                                    const imgId = `[IMG_${Date.now()}]`;
                                    setE({...e, b: e.b + `\n${imgId}\n`, imgs: [...(e.imgs || []), {id: imgId, d: res}]});
                                })} className="absolute inset-0 opacity-0 cursor-pointer" />
                            </div>
                            <button onClick={() => {
                                if(!e.t || !e.b) return;
                                const next = data.map(i => i.id === activeId ? {...i, eps: [...(i.eps || []), {id: Date.now(), ...e}]} : i);
                                setData(next); setView('list');
                            }} className="text-blue-400 font-black px-2">저장</button>
                        </div>
                    </header>
                    <input placeholder="회차 제목" value={e.t} onChange={ev => setE({...e, t: ev.target.value})} className="text-xl font-black mb-6 border-b border-white/5 pb-2" />
                    <textarea placeholder="내용을 입력하세요... (이미지 버튼을 눌러 본문 중간에 삽화를 넣으세요)" value={e.b} onChange={ev => setE({...e, b: ev.target.value})} className="h-[500px] leading-relaxed text-lg resize-none" />
                </div>
            );

            // 5. 읽기 모드 (삽화 렌더링)
            if (view === 'read' && curEp) return (
                <div className="max-w-md mx-auto min-h-screen bg-[#020617]">
                    <header className="p-4 border-b border-white/5 sticky top-0 bg-[#020617]/95 backdrop-blur z-10 flex gap-4 items-center">
                        <button onClick={() => setView('list')} className="opacity-30"><i data-lucide="arrow-left" size="20"></i></button>
                        <span className="text-[10px] font-bold opacity-20 uppercase truncate">{curEp.t}</span>
                    </header>
                    <div className="p-8 pb-40">
                        <div className="text-[18px] leading-[2.2] font-light text-slate-300 whitespace-pre-wrap">
                            {(curEp.b || "").split(/(\[IMG_\d+\])/).map((p, i) => {
                                if (p.startsWith('[IMG_')) {
                                    const img = (curEp.imgs || []).find(img => img.id === p);
                                    return img ? <img key={i} src={img.d} className="content-img" /> : null;
                                }
                                return p;
                            })}
                        </div>
                    </div>
                </div>
            );
            return null;
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
