<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Archive</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #020617; color: #f1f5f9; margin: 0; font-family: system-ui; -webkit-tap-highlight-color: transparent; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 1rem; overflow: hidden; position: relative; }
        input, textarea { background: transparent; border: none; outline: none; color: white; width: 100%; }
        .view { display: none; }
        .view.active { display: block; }
        #loading { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10000; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>
    <div id="loading">사진 처리 중...</div>

    <div id="view-home" class="view active p-6 max-w-md mx-auto min-h-screen">
        <header class="flex justify-between items-center mb-10 pt-4">
            <h1 class="text-xl font-black text-blue-500 italic">ARCHIVE</h1>
            <button onclick="showView('add')" class="bg-blue-600 px-5 py-2 rounded-full text-xs font-bold shadow-lg">+ 신규</button>
        </header>
        <div id="story-list" class="grid grid-cols-2 gap-5">
            </div>
    </div>

    <div id="view-add" class="view p-6 max-w-md mx-auto">
        <button onclick="showView('home')" class="mb-10 opacity-30"><i data-lucide="arrow-left"></i></button>
        <div class="w-40 aspect-[3/4] card mx-auto mb-10 flex items-center justify-center border-dashed border-white/20">
            <img id="cover-preview" class="w-full h-full object-cover hidden" />
            <div id="cover-placeholder" class="text-center opacity-20"><i data-lucide="image" class="mx-auto mb-2"></i><p className="text-[10px]">No Cover</p></div>
            <input type="file" id="cover-input" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" />
        </div>
        <input type="text" id="story-title" placeholder="이야기 제목" class="text-2xl border-b border-white/5 py-4 mb-10 font-black" />
        <div id="edit-buttons" class="flex gap-3 hidden mb-10">
            <button onclick="deleteStory()" class="flex-1 bg-red-900/30 text-red-500 py-4 rounded-2xl font-bold">삭제</button>
            <button id="save-btn" onclick="saveStory()" class="flex-[2] bg-blue-600 py-4 rounded-2xl font-bold">완료</button>
        </div>
        <button id="add-btn" onclick="saveStory()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold shadow-xl">생성하기</button>
    </div>

    <div id="view-list" class="view max-w-md mx-auto min-h-screen">
        <div class="p-6 flex gap-5 items-end bg-slate-900/80 backdrop-blur-xl sticky top-0 z-10 border-b border-white/5">
            <div class="w-20 aspect-[3/4] card shrink-0 shadow-2xl"><img id="list-cover" class="w-full h-full object-cover" /></div>
            <div class="flex-1 min-w-0 pb-1">
                <h2 id="list-title" class="text-xl font-black mb-5 truncate leading-tight"></h2>
                <div class="flex gap-2">
                    <button onclick="showView('home')" class="bg-white/5 px-3 py-2 rounded-xl text-xs font-bold border border-white/5">목록</button>
                    <button onclick="editStory()" class="bg-white/10 px-3 py-2 rounded-xl text-xs font-bold">수정</button>
                    <button onclick="writeEpisode()" class="bg-blue-600 px-3 py-2 rounded-xl text-xs font-bold shadow-lg">작성</button>
                </div>
            </div>
        </div>
        <div id="episode-list" class="p-6 space-y-3">
            </div>
    </div>

    <div id="view-write" class="view p-6 max-w-md mx-auto min-h-screen">
        <header class="flex justify-between items-center mb-8">
            <button onclick="showView('list')" class="opacity-40"><i data-lucide="x"></i></button>
            <div class="flex gap-4 items-center">
                <div class="relative bg-white/5 p-2 rounded-xl border border-white/5">
                    <i data-lucide="image" size="20" className="text-blue-400"></i>
                    <input type="file" id="ep-img-input" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" />
                </div>
                <button onclick="saveEpisode()" class="text-blue-400 font-black px-2">저장</button>
            </div>
        </header>
        <input type="text" id="ep-title" placeholder="회차 제목" class="text-xl font-black mb-6 border-b border-white/5 pb-3" />
        <textarea id="ep-body" placeholder="내용을 입력하세요..." class="h-[500px] leading-relaxed text-lg resize-none"></textarea>
    </div>

    <div id="view-read" class="view max-w-md mx-auto min-h-screen bg-[#070b14]">
        <header class="p-4 border-b border-white/5 sticky top-0 bg-[#070b14]/95 backdrop-blur-lg z-10 flex gap-4 items-center">
            <button onclick="showView('list')" class="opacity-40 p-1"><i data-lucide="arrow-left" size="20"></i></button>
            <span id="read-title" class="text-[10px] font-bold tracking-tighter opacity-30 uppercase truncate"></span>
        </header>
        <div id="read-body" class="p-8 pb-40 text-[17px] leading-[2.3] font-light text-slate-300 whitespace-pre-wrap">
            </div>
    </div>

    <script>
        const STORAGE_KEY = 'archive_bare_v1';
        let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        let activeId = null;
        let activeEpIdx = null;
        let tempCover = null;
        let tempEpImgs = [];

        // 초기화
        lucide.createIcons();
        renderHome();

        // 화면 전환 함수
        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            
            // 등록화면 초기화
            if (viewId === 'add') {
                tempCover = null;
                document.getElementById('edit-buttons').classList.add('hidden');
                document.getElementById('add-btn').classList.remove('hidden');
                document.getElementById('cover-preview').classList.add('hidden');
                document.getElementById('cover-placeholder').classList.remove('hidden');
                document.getElementById('story-title').value = '';
            }
            lucide.createIcons();
        }

        // 이미지 로딩 함수
        function handleImageLoad(file, callback) {
            if (!file) return;
            document.getElementById('loading').style.display = 'flex';
            const reader = new FileReader();
            reader.onload = (e) => {
                callback(e.target.result);
                document.getElementById('loading').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        // 표지 선택 핸들러
        document.getElementById('cover-input').addEventListener('change', (e) => {
            handleImageLoad(e.target.files[0], (result) => {
                tempCover = result;
                document.getElementById('cover-preview').src = result;
                document.getElementById('cover-preview').classList.remove('hidden');
                document.getElementById('cover-placeholder').classList.add('hidden');
            });
        });

        // 렌더링 함수들
        function renderHome() {
            const list = document.getElementById('story-list');
            list.innerHTML = data.length === 0 ? '<p class="col-span-2 text-center py-20 opacity-30 text-sm">저장된 이야기가 없습니다.</p>' : '';
            data.forEach(item => {
                const card = `
                    <div onclick="selectStory(${item.id})" class="active:scale-95 transition-transform">
                        <div class="aspect-[3/4] card mb-2 shadow-xl border-white/5">${item.c ? `<img src="${item.c}" class="w-full h-full object-cover" />` : ''}</div>
                        <div class="text-sm font-bold truncate px-1 opacity-80 text-center">${item.t}</div>
                    </div>
                `;
                list.insertAdjacentHTML('beforeend', card);
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        // 작품 관리 함수들
        function selectStory(id) {
            activeId = id;
            const cur = data.find(i => i.id === id);
            document.getElementById('list-cover').src = cur.c || '';
            document.getElementById('list-title').textContent = cur.t;
            renderEpisodes();
            showView('list');
        }

        function saveStory() {
            const title = document.getElementById('story-title').value;
            if (!title) return alert('제목을 입력해주세요.');
            
            const curView = document.getElementById('view-add').classList.contains('view') ? 'edit' : 'add';
            if (activeId && document.getElementById('add-btn').classList.contains('hidden')) {
                // 수정 모드
                data = data.map(i => i.id === activeId ? {...i, t: title, c: tempCover} : i);
                selectStory(activeId);
            } else {
                // 생성 모드
                data.unshift({ id: Date.now(), t: title, c: tempCover, eps: [] });
                showView('home');
                renderHome();
            }
        }

        function editStory() {
            const cur = data.find(i => i.id === activeId);
            tempCover = cur.c;
            document.getElementById('story-title').value = cur.t;
            if (tempCover) {
                document.getElementById('cover-preview').src = tempCover;
                document.getElementById('cover-preview').classList.remove('hidden');
                document.getElementById('cover-placeholder').classList.add('hidden');
            } else {
                document.getElementById('cover-preview').classList.add('hidden');
                document.getElementById('cover-placeholder').classList.remove('hidden');
            }
            document.getElementById('edit-buttons').classList.remove('hidden');
            document.getElementById('add-btn').classList.add('hidden');
            showView('add');
        }

        function deleteStory() {
            if (!confirm('정말 이 작품을 삭제하시겠습니까?')) return;
            data = data.filter(i => i.id !== activeId);
            showView('home');
            renderHome();
        }

        // 회차 관리 함수들
        function renderEpisodes() {
            const cur = data.find(i => i.id === activeId);
            const list = document.getElementById('episode-list');
            list.innerHTML = cur.eps.length === 0 ? '<div class="py-20 text-center opacity-20 text-xs">작성된 회차가 없습니다.</div>' : '';
            cur.eps.forEach((ep, i) => {
                const epItem = `
                    <div onclick="readEpisode(${i})" class="card p-5 flex justify-between items-center active:bg-slate-700/50 transition-all cursor-pointer">
                        <span class="font-bold text-slate-200">${i+1}. ${ep.t}</span>
                        <i data-lucide="chevron-right" size="16" class="opacity-20"></i>
                    </div>
                `;
                list.insertAdjacentHTML('beforeend', epItem);
            });
            lucide.createIcons();
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function writeEpisode() {
            tempEpImgs = [];
            document.getElementById('ep-title').value = '';
            document.getElementById('ep-body').value = '';
            showView('write');
        }

        function saveEpisode() {
            const title = document.getElementById('ep-title').value;
            const body = document.getElementById('ep-body').value;
            if (!title || !body) return alert('제목과 내용을 모두 입력해주세요.');
            data = data.map(i => i.id === activeId ? {...i, eps: [...(i.eps || []), {id: Date.now(), t: title, b: body, imgs: tempEpImgs}]} : i);
            selectStory(activeId);
        }

        function readEpisode(idx) {
            activeEpIdx = idx;
            const cur = data.find(i => i.id === activeId);
            const curEp = cur.eps[idx];
            document.getElementById('read-title').textContent = curEp.t;
            let readBody = curEp.b;
            curEp.imgs.forEach(img => {
                readBody = readBody.replace(img.id, `<img src="${img.d}" class="content-img my-8 shadow-2xl rounded-2xl" />`);
            });
            document.getElementById('read-body').innerHTML = readBody;
            showView('read');
        }
    </script>
</body>
</html>
