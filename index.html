
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>우주로 (UJURO)</title>
    
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #121214; color: #e1e1e1; margin: 0; }
        .bg-blue { background-color: #3b82f6; }
        .glass { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
        input, textarea { background: transparent; outline: none; border: none; color: white; width: 100%; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('home'); // home, create, detail, write
            const [novels, setNovels] = useState(() => JSON.parse(localStorage.getItem('ujuro_v1') || '[]'));
            const [selectedId, setSelectedId] = useState(null);

            const [nForm, setNForm] = useState({ title: '', cover: null });
            const [eForm, setEForm] = useState({ title: '', content: '' });

            useEffect(() => {
                localStorage.setItem('ujuro_v1', JSON.stringify(novels));
                if (window.lucide) window.lucide.createIcons();
            }, [novels, view]);

            const curNovel = novels.find(n => n.id === selectedId);

            // 홈 화면
            if (view === 'home') return (
                <div className="p-6">
                    <div className="flex justify-between items-center mb-10">
                        <h1 className="text-2xl font-black italic text-blue-500">우주로</h1>
                        <button onClick={() => setView('create')} className="bg-blue px-4 py-2 rounded-full text-xs font-bold">+ 연재</button>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        {novels.map(n => (
                            <div key={n.id} onClick={() => { setSelectedId(n.id); setView('detail'); }}>
                                <div className="aspect-[3/4] glass rounded-xl overflow-hidden mb-2">
                                    {n.cover && <img src={n.cover} className="w-full h-full object-cover" />}
                                </div>
                                <div className="font-bold text-sm truncate">{n.title}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // 작품 등록
            if (view === 'create') return (
                <div className="p-6">
                    <button onClick={() => setView('home')} className="mb-6 opacity-50"><i data-lucide="chevron-left"></i></button>
                    <div className="w-32 aspect-[3/4] glass mx-auto mb-8 rounded-xl overflow-hidden relative flex items-center justify-center">
                        {nForm.cover ? <img src={nForm.cover} className="w-full h-full object-cover" /> : <i data-lucide="image" className="opacity-10"></i>}
                        <input type="file" onChange={e => {
                            const reader = new FileReader();
                            reader.onload = r => setNForm({...nForm, cover: r.target.result});
                            reader.readAsDataURL(e.target.files[0]);
                        }} className="absolute inset-0 opacity-0" />
                    </div>
                    <input placeholder="작품 제목" value={nForm.title} onChange={e => setNForm({...nForm, title: e.target.value})} className="border-b border-white/10 py-4 text-xl mb-8" />
                    <button onClick={() => {
                        setNovels([{ id: Date.now(), ...nForm, episodes: [] }, ...novels]);
                        setNForm({ title: '', cover: null });
                        setView('home');
                    }} className="w-full bg-blue py-4 rounded-xl font-bold">등록 완료</button>
                </div>
            );

            // 회차 목록 (상세화면)
            if (view === 'detail' && curNovel) return (
                <div>
                    <div className="p-6 glass flex gap-4 items-end">
                        <div className="w-20 aspect-[3/4] glass rounded overflow-hidden">
                            {curNovel.cover && <img src={curNovel.cover} className="w-full h-full object-cover" />}
                        </div>
                        <div className="flex-1">
                            <h2 className="text-xl font-bold mb-3">{curNovel.title}</h2>
                            <div className="flex gap-2">
                                <button onClick={() => setView('home')} className="bg-white/10 px-3 py-1 rounded text-xs">홈</button>
                                <button onClick={() => setView('write')} className="bg-blue px-3 py-1 rounded text-xs">작성</button>
                            </div>
                        </div>
                    </div>
                    <div className="p-6 space-y-3">
                        {curNovel.episodes.map((ep, i) => (
                            <div key={ep.id} className="glass p-4 rounded-xl flex justify-between">
                                <span>{i + 1}화. {ep.title}</span>
                                <i data-lucide="chevron-right" className="opacity-20"></i>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // 회차 작성
            if (view === 'write') return (
                <div className="p-6">
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={() => setView('detail')}><i data-lucide="x"></i></button>
                        <button onClick={() => {
                            const up = novels.map(n => n.id === selectedId ? {...n, episodes: [...n.episodes, {id: Date.now(), ...eForm}]} : n);
                            setNovels(up);
                            setEForm({title:'', content:''});
                            setView('detail');
                        }} className="text-blue-500 font-bold">등록</button>
                    </div>
                    <input placeholder="회차 제목" value={eForm.title} onChange={e => setEForm({...eForm, title: e.target.value})} className="text-lg font-bold border-b border-white/10 py-2 mb-4" />
                    <textarea placeholder="내용을 입력하세요" value={eForm.content} onChange={e => setEForm({...eForm, content: e.target.value})} className="h-96" />
                </div>
            );

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
