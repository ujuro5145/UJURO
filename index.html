<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Archive</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; margin: 0; font-family: sans-serif; -webkit-user-select: none; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 1rem; overflow: hidden; }
        input, textarea { background: transparent; border: none; outline: none; color: white; width: 100%; }
        .content-img { width: 100%; border-radius: 0.75rem; margin: 1.5rem 0; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('home');
            const [data, setData] = useState(() => {
                try {
                    return JSON.parse(localStorage.getItem('archive_final_v3') || '[]');
                } catch(e) { return []; }
            });
            const [activeId, setActiveId] = useState(null);
            const [activeEpIdx, setActiveEpIdx] = useState(null);

            const [f, setF] = useState({ t: '', c: null });
            const [e, setE] = useState({ t: '', b: '', imgs: [] });

            useEffect(() => {
                try {
                    localStorage.setItem('archive_final_v3', JSON.stringify(data));
                } catch(err) {
                    alert("용량이 부족합니다! 사진을 줄이거나 이전 작품을 삭제해주세요.");
                }
                if (window.lucide) window.lucide.createIcons();
            }, [data, view]);

            const cur = data.find(i => i.id === activeId);
            const curEp = cur?.eps ? cur.eps[activeEpIdx] : null;

            // 1. 홈 화면
            if (view === 'home') return (
                <div className="p-6 max-w-md mx-auto">
                    <header className="flex justify-between items-center mb-10">
                        <h1 className="text-xl font-black text-indigo-400">ARCHIVE</h1>
                        <button onClick={() => setView('add')} className="bg-indigo-600 px-4 py-2 rounded-full text-xs font-bold">+ 신규</button>
                    </header>
                    <div className="grid grid-cols-2 gap-4">
                        {data.map(i => (
                            <div key={i.id} onClick={() => { setActiveId(i.id); setView('list'); }}>
                                <div className="aspect-[3/4] card mb-2">{i.c && <img src={i.c} className="w-full h-full object-cover" />}</div>
                                <div className="text-sm font-bold truncate px-1">{i.t}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // 2. 작품 생성
            if (view === 'add') return (
                <div className="p-6 max-w-md mx-auto">
                    <button onClick={() => setView('home')} className="mb-6 opacity-40"><i data-lucide="chevron-left"></i></button>
                    <div className="w-32 aspect-[3/4] card mx-auto mb-8 relative flex items-center justify-center">
                        {f.c ? <img src={f.c} className="w-full h-full object-cover" /> : <i data-lucide="image" className="opacity-20"></i>}
                        <input type="file" accept="image/*" onChange={ev => {
                            const r = new FileReader();
                            r.onload = _ => setF({...f, c: _.target.result});
                            r.readAsDataURL(ev.target.files[0]);
                        }} className="absolute inset-0 opacity-0" />
                    </div>
                    <input placeholder="제목" value={f.t} onChange={ev => setF({...f, t: ev.target.value})} className="text-xl border-b border-white/10 py-4 mb-8 font-bold" />
                    <button onClick={() => {
                        if(!f.t) return;
                        setData([{ id: Date.now(), ...f, eps: [] }, ...data]);
                        setF({t:'', c:null}); setView('home');
                    }} className="w-full bg-indigo-600 py-4 rounded-xl font-bold">등록</button>
                </div>
            );

            // 3. 회차 목록
            if (view === 'list' && cur) return (
                <div className="max-w-md mx-auto min-h-screen">
                    <div className="p-6 flex gap-4 items-end bg-slate-800/50 backdrop-blur sticky top-0 z-10">
                        <div className="w-20 aspect-[3/4] card shrink-0">{cur.c && <img src={cur.c} className="w-full h-full object-cover" />}</div>
                        <div className="flex-1 min-w-0">
                            <h2 className="text-xl font-black mb-4 truncate">{cur.t}</h2>
                            <div className="flex gap-2">
                                <button onClick={() => setView('home')} className="bg-white/10 px-4 py-2 rounded text-xs font-bold">홈</button>
                                <button onClick={() => setView('write')} className="bg-indigo-600 px-4 py-2 rounded text-xs font-bold">작성</button>
                            </div>
                        </div>
                    </div>
                    <div className="p-6 space-y-3">
                        {cur.eps.map((ep, i) => (
                            <div key={ep.id} onClick={() => { setActiveEpIdx(i); setView('read'); }} className="card p-5 flex justify-between active:bg-slate-700 transition-colors cursor-pointer">
                                <span className="font-bold">{i+1}. {ep.t}</span>
                                <i data-lucide="chevron-right" size="16" className="opacity-20"></i>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // 4. 회차 작성 (삽화 기능)
            if (view === 'write') return (
                <div className="p-6 max-w-md mx-auto min-h-screen">
                    <div className="flex justify-between items-center mb-8">
                        <button onClick={() => setView('list')} className="opacity-40"><i data-lucide="x"></i></button>
                        <div className="flex gap-4">
                            <div className="relative bg-white/10 p-2 rounded-lg">
                                <i data-lucide="image" size="20" className="text-indigo-400"></i>
                                <input type="file" onChange={ev => {
                                    const r = new FileReader();
                                    r.onload = _ => {
                                        const id = `[IMG_${Date.now()}]`;
                                        setE({...e, b: e.b + `\n${id}\n`, imgs: [...e.imgs, {id, d: _.target.result}]});
                                    };
                                    r.readAsDataURL(ev.target.files[0]);
                                }} className="absolute inset-0 opacity-0" />
                            </div>
                            <button onClick={() => {
                                if(!e.t || !e.b) return;
                                const next = data.map(i => i.id === activeId ? {...i, eps: [...i.eps, {id: Date.now(), ...e}]} : i);
                                setData(next); setE({t:'', b:'', imgs:[]}); setView('list');
                            }} className="text-indigo-400 font-bold">저장</button>
                        </div>
                    </div>
                    <input placeholder="회차 제목" value={e.t} onChange={ev => setE({...e, t: ev.target.value})} className="text-xl font-black mb-4 border-b border-white/5" />
                    <textarea placeholder="내용 작성..." value={e.b} onChange={ev => setE({...e, b: ev.target.value})} className="h-[500px] leading-relaxed resize-none" />
                </div>
            );

            // 5. 읽기 모드
            if (view === 'read' && curEp) return (
                <div className="max-w-md mx-auto min-h-screen bg-[#0a0f1d]">
                    <header className="p-4 border-b border-white/5 sticky top-0 bg-[#0a0f1d]/90 backdrop-blur z-10 flex gap-4 items-center">
                        <button onClick={() => setView('list')} className="opacity-40"><i data-lucide="arrow-left" size="20"></i></button>
                        <span className="text-xs font-bold opacity-30">{curEp.t}</span>
                    </header>
                    <div className="p-8 pb-32">
                        <div className="text-lg leading-[2.2] font-light text-slate-300 whitespace-pre-wrap">
                            {curEp.b.split(/(\[IMG_\d+\])/).map((p, i) => {
                                if (p.startsWith('[IMG_')) {
                                    const img = curEp.imgs.find(img => img.id === p);
                                    return img ? <img key={i} src={img.d} className="content-img" /> : null;
                                }
                                return p;
                            })}
                        </div>
                    </div>
                </div>
            );
            return null;
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
