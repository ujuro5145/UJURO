<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NOVEL-FREE</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0f1012; color: #e1e1e1; margin: 0; padding: 0; }
        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; padding: 40px 20px; text-align: center; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const App = () => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, []);
            return (
                <div className="app-container">
                    <h1 className="text-4xl font-black italic text-[#ff4e84] mb-12 tracking-tighter">NOVEL-FREE</h1>
                    <div className="bg-white/5 p-10 rounded-[32px] border border-white/10 mb-8 shadow-2xl">
                        <div className="w-20 h-20 bg-pink-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                            <i data-lucide="check-circle-2" className="text-[#ff4e84]" style={{width: 40, height: 40}}></i>
                        </div>
                        <p className="text-xl font-bold mb-3">축하합니다!</p>
                        <p className="text-sm opacity-50 leading-relaxed">나만의 소설 플랫폼 앱이<br/>이제 정상적으로 연결되었습니다.</p>
                    </div>
                    <button onClick={() => window.location.reload()} className="w-full py-5 bg-[#ff4e84] rounded-2xl font-black shadow-lg shadow-pink-500/20 active:scale-95 transition-transform">작동 확인 완료</button>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
