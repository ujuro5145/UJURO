<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>우주로 (UJURO)</title>
    
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #121214; color: #e1e1e1; margin: 0; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .np-blue { color: #3b82f6; }
        .bg-np-blue { background-color: #3b82f6; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        input, textarea { background: transparent !important; outline: none !important; color: #e1e1e1 !important; }
        /* 이미지 업로드 중 로딩 표시 */
        .loading-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: flex; items-center; justify-content: center; z-index: 10; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 이미지 압축 유틸리티 함수 ---
        const compressImage = (file, maxWidth, maxHeight, quality) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > maxWidth) {
                                height *= maxWidth / width;
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width *= maxHeight / height;
                                height = maxHeight;
                            }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // 압축률 적용 (JPEG로 변환하여 용량 최소화)
                        const dataUrl = canvas.toDataURL('image/jpeg', quality);
                        resolve(dataUrl);
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        };

        const App = () => {
            const [view, setView] = useState('home'); 
            const [novels, setNovels] = useState(() => {
                try {
                    return JSON.parse(localStorage.getItem('np_data') || '[]');
                } catch (e) {
                    console.error("LocalStorage 로딩 실패:", e);
                    return [];
                }
            });
            const [currentNovel, setCurrentNovel] = useState(null);
            const [currentEpisode, setCurrentEpisode] = useState(null);
            const [editTarget, setEditTarget] = useState(null);

            const [novelForm, setNovelForm] = useState({ title: '', cover: null });
            const [epForm, setEpForm] = useState({ title: '', content: '', illustration: null });
            const [showMenuId, setShowMenuId] = useState(null);
            const [isUploading, setIsUploading] = useState(false); // 로딩 상태

            useEffect(() => {
                try {
                    localStorage.setItem('np_data', JSON.stringify(novels));
                } catch (e) {
                    console.error("LocalStorage 저장 실패 (용량 초과 가능성):", e);
                    alert("저장 공간이 부족합니다. 이미지를 더 작은 용량으로 올리거나 기존 데이터를 정리해주세요.");
                }
                if (window.lucide) window.lucide.createIcons();
            }, [novels, view, showMenuId]);

            // --- 개선된 파일 핸들러 (압축 기능 추가) ---
            const handleFile = async (e, type) => {
                const file = e.target.files[0];
                if (!file) return;
                
                setIsUploading(true); // 로딩 시작
                try {
                    // 표지: 300x400, 압축률 0.6 / 삽화: 800x600, 압축률 0.7
                    const maxWidth = type === 'cover' ? 300 : 800;
                    const maxHeight = type === 'cover' ? 400 : 600;
                    const quality = type === 'cover' ? 0.6 : 0.7;

                    const compressedDataUrl = await compressImage(file, maxWidth, maxHeight, quality);
                    
                    if(type === 'cover') setNovelForm({...novelForm, cover: compressedDataUrl});
                    else setEpForm({...epForm, illustration: compressedDataUrl});
                } catch (error) {
                    console.error("이미지 압축 실패:", error);
                    alert("이미지 처리에 실패했습니다. 다른 파일을 시도해보세요.");
                } finally {
                    setIsUploading(false); // 로딩 종료
                }
            };

            const addNovel = () => {
                if (!novelForm.title) return alert('제목을 입력하세요!');
                const newNovel = { id: Date.now(), ...novelForm, episodes: [] };
                setNovels([newNovel, ...novels]);
                setNovelForm({ title: '', cover: null });
                setView('home');
            };

            const addEpisode = () => {
                if (!epForm.title || !epForm.content) return alert('제목과 내용을 입력하세요!');
                const updatedNovels = novels.map(n => {
                    if (n.id === currentNovel.id) {
                        const newEp = { id: Date.now(), ...epForm, date: new Date().toLocaleDateString() };
                        const updatedEps = editTarget 
                            ? n.episodes.map(e => e.id === editTarget.id ? {...newEp, id: e.id} : e)
                            : [...n.episodes, newEp];
                        return { ...n, episodes: updatedEps };
                    }
                    return n;
                });
                setNovels(updatedNovels);
                setCurrentNovel(updatedNovels.find(n => n.id === currentNovel.id));
                setEpForm({ title: '', content: '', illustration: null });
                setEditTarget(null);
                setView('novel_detail');
            };

            const deleteEpisode = (id) => {
                if(!confirm('정말 삭제하시겠습니까?')) return;
                const updatedNovels = novels.map(n => {
                    if (n.id === currentNovel.id) {
                        return { ...n, episodes: n.episodes.filter(e => e.id !== id) };
                    }
                    return n;
                });
                setNovels(updatedNovels);
                setCurrentNovel(updatedNovels.find(n => n.id === currentNovel.id));
                setShowMenuId(null);
            };

            // 데이터 초기화 기능 (긴급 탈출용)
            const resetData = () => {
                if(confirm('모든 작품과 회차 데이터가 영구적으로 삭제됩니다. 정말 초기화하시겠습니까?')) {
                    localStorage.removeItem('np_data');
                    setNovels([]);
                    setView('home');
                    alert('데이터가 초기화되었습니다.');
                }
            };

            // 1. 홈 화면
            if (view === 'home') return (
                <div className="min-h-screen max-w-[500px] mx-auto pb-20 relative">
                    <header className="p-6 flex justify-between items-center sticky top-0 bg-[#121214] z-20 border-b border-white/5">
                        <h1 className="text-2xl font-black italic text-blue-500">우주로</h1>
                        <div className="flex gap-2">
                            <button onClick={resetData} className="text-xs opacity-30 hover:opacity-100 p-2"><i data-lucide="trash-2" size="16"></i></button>
                            <button onClick={() => setView('create_novel')} className="bg-np-blue text-white text-xs font-bold px-4 py-2 rounded-full shadow-lg shadow-blue-500/20">+ 연재하기</button>
                        </div>
                    </header>
                    <main className="p-6 grid grid
