<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NOVEL-FREE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #121214; color: #e1e1e1; margin: 0; }
        .np-blue { background-color: #3b82f6; }
        .np-card { background: #1e1e21; border: 1px solid #2d2d31; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('home'); 
            const [novels, setNovels] = useState(() => {
                const saved = localStorage.getItem('np_novels');
                return saved ? JSON.parse(saved) : [];
            });
            const [selectedNovel, setSelectedNovel] = useState(null);
            
            // 글쓰기 폼
            const [title, setTitle] = useState('');
            const [content, setContent] = useState('');
            const [cover, setCover] = useState(null);

            useEffect(() => {
                localStorage.setItem('np_novels', JSON.stringify(novels));
                if (window.lucide) window.lucide.createIcons();
            }, [novels, view]);

            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setCover(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const handleSave = () => {
                if (!title || !content) return alert('제목과 내용을 입력해주세요!');
                const newNovel = { 
                    id: Date.now(), 
                    title, content, cover, 
                    author: "나의 작가",
                    stats: { views: "0", likes: "0", stars: "0" },
                    date: new Date().toLocaleDateString() 
                };
                setNovels([newNovel, ...novels]);
                setTitle(''); setContent(''); setCover(null);
                setView('home');
            };

            // --- 1. 작성 화면 ---
            if (view === 'write') return (
                <div className="min-h-screen bg-[#121214] max-w-[500px] mx-auto">
                    <header className="p-4 flex justify-between items-center border-b border-white/5 sticky top-0 bg-[#121214] z-10">
                        <button onClick={() => setView('home')}><i data-lucide="chevron-left"></i></button>
                        <h2 className="font-bold">작품 연재하기</h2>
                        <button onClick={handleSave} className="text-blue-400 font-bold">등록</button>
                    </header>
                    <div className="p-6 space-y-6">
                        <div className="w-[140px] aspect-[3/4] mx-auto bg-white/5 rounded-lg overflow-hidden border border-dashed border-white/20 relative">
                            {cover ? <img src={cover} className="w-full h-full object-cover" /> : <div className="flex flex-col items-center justify-center h-full opacity-20 text-xs text-center p-2"><i data-lucide="image" className="mb-2"></i>표지 추가</div>}
                            <input type="file" onChange={handleImageChange} className="absolute inset-0 opacity-0" />
                        </div>
                        <input type="text" placeholder="작품 제목" value={title} onChange={(e) => setTitle(e.target.value)} className="w-full bg-transparent border-b border-white/10 p-2 text-xl font-bold outline-none focus:border-blue-500" />
                        <textarea placeholder="줄거리를 입력하세요..." value={content} onChange={(e) => setContent(e.target.value)} className="w-full bg-transparent p-2 h-[400px] outline-none resize-none leading-relaxed text-sm"></textarea>
                    </div>
                </div>
            );

            // --- 2. 뷰어 화면 (노벨피아 스타일) ---
            if (view === 'viewer') return (
                <div className="min-h-screen bg-[#1a1b1e] max-w-[500px] mx-auto">
                    <header className="p-4 flex items-center gap-4 border-b border-white/5 sticky top-0 bg-[#1a1b1e] z-10">
                        <button onClick={() => setView('home')}><i data-lucide="arrow-left" size="20"></i></button>
                        <h2 className="text-sm font-medium truncate">{selectedNovel.title}</h2>
                    </header>
                    <div className="p-6 leading-[2] text-[17px] text-gray-200 tracking-wide font-light whitespace-pre-wrap">
                        {selectedNovel.content}
                    </div>
                    <div className="p-10 text-center opacity-20 border-t border-white/5">이 작품의 끝입니다.</div>
                </div>
            );

            // --- 3. 메인 홈 화면 ---
            return (
                <div className="min-h-screen max-w-[500px] mx-auto pb-24">
                    <header className="p-5 flex justify-between items-center sticky top-0 bg-[#121214] z-10">
                        <h1 className="text-xl font-black italic text-blue-500 tracking-tighter">NOVELPIA FREE</h1>
                        <div className="flex gap-4"><i data-lucide="search" size="22"></i><i data-lucide="bell" size="22"></i></div>
                    </header>
                    
                    <main className="px-5">
                        {/* 상단 배너 */}
                        <div className="w-full aspect-[16/7] bg-gradient-to-br from-blue-600 to-purple-700 rounded-2xl mb-8 p-6 flex flex-col justify-end shadow-lg shadow-blue-900/20">
                            <span className="text-[10px] font-bold bg-black/20 self-start px-2 py-0.5 rounded-full mb-2">NEW EVENT</span>
                            <h2 className="text-xl font-black leading-tight">상상의 한계가 없는 곳,<br/>자유로운 연재 플랫폼</h2>
                        </div>

                        <div className="flex justify-between items-end mb-4">
                            <h3 className="font-bold text-lg">최근 올라온 작품</h3>
                            <button onClick={() => setView('write')} className="text-xs bg-blue-500 px-3 py-1 rounded-full font-bold">연재하기</button>
                        </div>

                        {novels.length === 0 ? (
                            <div className="py-20 text-center opacity-20 border-2 border-dashed border-white/5 rounded-2xl">
                                <i data-lucide="plus-circle" className="mx-auto mb-2"></i>
                                <p className="text-xs font-medium">작품이 없습니다. 첫 글을 써보세요!</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-2 gap-4">
                                {novels.map(novel => (
                                    <div key={novel.id} onClick={() => { setSelectedNovel(novel); setView('viewer'); }} className="group active:scale-95 transition-all">
                                        <div className="aspect-[3/4] rounded-lg overflow-hidden bg-white/5 mb-2 shadow-md relative">
                                            {novel.cover ? <img src={novel.cover} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center opacity-10 font-bold">NO IMAGE</div>}
                                            <div className="absolute bottom-0 left-0 right-0 p-2 bg-gradient-to-t from-black/80 to-transparent">
                                                <div className="flex items-center gap-2 text-[10px] font-bold">
                                                    <span className="text-blue-400 flex items-center gap-0.5"><i data-lucide="eye" size="10"></i> 0</span>
                                                    <span className="text-red-400 flex items-center gap-0.5"><i data-lucide="heart" size="10"></i> 0</span>
                                                </div>
                                            </div>
                                        </div>
                                        <h4 className="font-bold text-sm truncate">{novel.title}</h4>
                                        <p className="text-[11px] opacity-40 italic">{novel.author}</p>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* 하단 바 */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-[500px] mx-auto bg-[#121214] border-t border-white/5 p-4 px-10 flex justify-between items-center">
                        <i data-lucide="home" className="text-blue-500"></i>
                        <i data-lucide="award" className="opacity-30"></i>
                        <i data-lucide="library" className="opacity-30"></i>
                        <i data-lucide="user" className="opacity-30"></i>
                    </nav>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
