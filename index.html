<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>My Story Archive</title>
    
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #0f172a; color: #f1f5f9; margin: 0; -webkit-tap-highlight-color: transparent; }
        .card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(8px); }
        .accent-button { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        input, textarea { background: transparent; border: none; outline: none; color: white; width: 100%; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('home'); // home, create, detail, write, read
            const [stories, setStories] = useState(() => JSON.parse(localStorage.getItem('my_archive_v1') || '[]'));
            const [activeId, setActiveId] = useState(null);
            const [activeEpId, setActiveEpId] = useState(null);

            const [sForm, setSForm] = useState({ title: '', cover: null });
            const [eForm, setEForm] = useState({ title: '', content: '' });

            useEffect(() => {
                localStorage.setItem('my_archive_v1', JSON.stringify(stories));
                if (window.lucide) window.lucide.createIcons();
            }, [stories, view]);

            const currentStory = stories.find(s => s.id === activeId);
            const currentEp = currentStory?.episodes.find(e => e.id === activeEpId);

            // 1. 홈 화면 (목록)
            if (view === 'home') return (
                <div className="max-w-md mx-auto min-h-screen p-6">
                    <header className="flex justify-between items-center mb-12 pt-4">
                        <h1 className="text-2xl font-black tracking-tighter">ARCHIVE</h1>
                        <button onClick={() => setView('create')} className="accent-button px-5 py-2 rounded-full text-sm font-bold shadow-lg">+ New</button>
                    </header>
                    <div className="grid grid-cols-2 gap-6">
                        {stories.length === 0 && <p className="col-span-2 text-center py-20 opacity-30 text-sm">저장된 이야기가 없습니다.</p>}
                        {stories.map(s => (
                            <div key={s.id} onClick={() => { setActiveId(s.id); setView('detail'); }} className="group cursor-pointer">
                                <div className="aspect-[3/4] rounded-2xl overflow-hidden mb-3 shadow-xl card active:scale-95 transition-all">
                                    {s.cover ? <img src={s.cover} className="w-full h-full object-cover" /> : <div className="h-full flex items-center justify-center opacity-20"><i data-lucide="book"></i></div>}
                                </div>
                                <h3 className="font-bold text-sm truncate px-1 group-hover:text-indigo-400">{s.title}</h3>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // 2. 이야기 만들기
            if (view === 'create') return (
                <div className="max-w-md mx-auto min-h-screen p-6">
                    <button onClick={() => setView('home')} className="mb-10 opacity-50 hover:opacity-100"><i data-lucide="arrow-left"></i></button>
                    <div className="card w-40 aspect-[3/4] mx-auto rounded-3xl overflow-hidden mb-10 relative flex items-center justify-center border-2 border-dashed border-white/20">
                        {sForm.cover ? <img src={sForm.cover} className="w-full h-full object-cover" /> : <i data-lucide="plus" className="opacity-20"></i>}
                        <input type="file" accept="image/*" onChange={e => {
                            const reader = new FileReader();
                            reader.onload = r => setSForm({...sForm, cover: r.target.result});
                            reader.readAsDataURL(e.target.files[0]);
                        }} className="absolute inset-0 opacity-0 cursor-pointer" />
                    </div>
                    <input placeholder="제목을 입력하세요" value={sForm.title} onChange={e => setSForm({...sForm, title: e.target.value})} className="text-2xl font-black mb-12 border-b border-white/10 pb-4" />
                    <button onClick={() => {
                        if(!sForm.title) return;
                        setStories([{ id: Date.now(), ...sForm, episodes: [] }, ...stories]);
                        setSForm({title:'', cover:null});
                        setView('home');
                    }} className="w-full accent-button py-4 rounded-2xl font-bold text-lg shadow-xl">생성하기</button>
                </div>
            );

            // 3. 이야기 상세 (회차 목록)
            if (view === 'detail' && currentStory) return (
                <div className="max-w-md mx-auto min-h-screen">
                    <div className="relative h-64 flex items-end p-6">
                        {currentStory.cover && <img src={currentStory.cover} className="absolute inset-0 w-full h-full object-cover opacity-20 blur-xl" />}
                        <button onClick={() => setView('home')} className="absolute top-8 left-6 z-10 p-2 bg-black/20 rounded-full"><i data-lucide="chevron-left"></i></button>
                        <div className="relative z-10 flex gap-6 items-end">
                            <div className="w-28 aspect-[3/4] rounded-xl overflow-hidden shadow-2xl card border-white/20">
                                {currentStory.cover && <img src={currentStory.cover} className="w-full h-full object-cover" />}
                            </div>
                            <div className="mb-2 flex-1 min-w-0">
                                <h2 className="text-2xl font-black truncate mb-4">{currentStory.title}</h2>
                                <button onClick={() => setView('write')} className="accent-button px-6 py-2 rounded-xl text-xs font-bold">새 회차 작성</button>
                            </div>
                        </div>
                    </div>
                    <div className="p-6 space-y-4">
                        {currentStory.episodes.map((ep, i) => (
                            <div key={ep.id} onClick={() => { setActiveEpId(ep.id); setView('read'); }} className="card p-5 rounded-2xl flex justify-between items-center active:bg-white/10 transition-colors cursor-pointer">
                                <span className="font-bold opacity-90">{i + 1}. {ep.title}</span>
                                <i data-lucide="play" size="14" className="text-indigo-400"></i>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // 4. 회차 작성
            if (view === 'write') return (
                <div className="max-w-md mx-auto min-h-screen p-6">
                    <header className="flex justify-between items-center mb-8">
                        <button onClick={() => setView('detail')} className="opacity-50"><i data-lucide="x"></i></button>
                        <button onClick={() => {
                            if(!eForm.title || !eForm.content) return;
                            const updated = stories.map(s => s.id === activeId ? {...s, episodes: [...s.episodes, {id: Date.now(), ...eForm}]} : n);
                            setStories(updated);
                            setEForm({title:'', content:''});
                            setView('detail');
                        }} className="text-indigo-400 font-bold">저장</button>
                    </header>
                    <input placeholder="회차 제목" value={eForm.title} onChange={e => setEForm({...eForm, title: e.target.value})} className="text-xl font-bold mb-6" />
                    <textarea placeholder="내용을 작성하세요..." value={eForm.content} onChange={e => setEForm({...eForm, content: e.target.value})} className="h-[500px] leading-relaxed text-lg font-light resize-none" />
                </div>
            );

            // 5. 독자 모드 (읽기)
            if (view === 'read' && currentEp) return (
                <div className="max-w-md
