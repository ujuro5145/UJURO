<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>우주로 (UJURO)</title>
    
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #121214; color: #e1e1e1; margin: 0; -webkit-tap-highlight-color: transparent; }
        .bg-np-blue { background-color: #3b82f6; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); }
        input, textarea { background: transparent !important; outline: none !important; color: #e1e1e1 !important; }
        .loading-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 50; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // 이미지 압축: 가로세로를 줄여 용량을 1/10로 만듭니다.
        const compressImage = (file, maxSide) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width;
                        let h = img.height;
                        if (w > h) { if (w > maxSide) { h *= maxSide / w; w = maxSide; } }
                        else { if (h > maxSide) { w *= maxSide / h; h = maxSide; } }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.5)); // 화질 50% 압축
                    };
                };
            });
        };

        const App = () => {
            const [view, setView] = useState('home');
            const [novels, setNovels] = useState(() => JSON.parse(localStorage.getItem('np_data') || '[]'));
            const [currentNovel, setCurrentNovel] = useState(null);
            const [novelForm, setNovelForm] = useState({ title: '', cover: null });
            const [epForm, setEpForm] = useState({ title: '', content: '', illustration: null });
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                try {
                    localStorage.setItem('np_data', JSON.stringify(novels));
                } catch (e) {
                    alert("저장 공간이 꽉 찼습니다! 휴지통 버튼으로 데이터를 비워주세요.");
                }
                if (window.lucide) window.lucide.createIcons();
            }, [novels, view]);

            const handleFile = async (e, type) => {
                setLoading(true);
                const file = e.target.files[0];
                const compressed = await compressImage(file, type === 'cover' ? 300 : 600);
                if(type === 'cover') setNovelForm({...novelForm, cover: compressed});
                else setEpForm({...epForm, illustration: compressed});
                setLoading(false);
            };

            if (loading) return <div className="loading-overlay"><div className="text-blue-500 font-bold">이미지 처리 중...</div></div>;

            if (view === 'home') return (
                <div className="min-h-screen max-w-[500px] mx-auto p-6">
                    <header className="flex justify-between items-center mb-8">
                        <h1 className="text-2xl font-black italic text-blue-500">우주로</h1>
                        <div className="flex gap-3">
                            <button onClick={() => { if(confirm('전체 초기화?')) { localStorage.clear(); location.reload(); } }} className="opacity-20"><i data-lucide="trash-2"></i></button>
                            <button onClick={() => setView('create')} className="bg-np-blue px-4 py-2 rounded-full text-xs font-bold">+ 연재</button>
                        </div>
                    </header>
                    <div className="grid grid-cols-2 gap-4">
                        {novels.map(n => (
                            <div key={n.id} onClick={() => { setCurrentNovel(n); setView('detail'); }} className="glass rounded-xl overflow-hidden">
                                <div className="aspect-[3/4] bg-white/5">
                                    {n.cover && <img src={n.cover} className="w-full h-full object-cover" />}
                                </div>
                                <div className="p-3 text-sm font-bold truncate">{n.title}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            if (view === 'create') return (
                <div className="p-6 max-w-[500px] mx-auto">
                    <button onClick={() => setView('home')} className="mb-8 opacity-50"><i data-lucide="chevron-left"></i></button>
                    <div className="w-32 aspect-[3/4] glass mx-auto mb-8 rounded-xl overflow-hidden relative">
                        {novelForm.cover ? <img src={novelForm.cover} className="w-full h-full object-cover" /> : <div className="h-full flex items-center justify-center opacity-10">표지</div>}
                        <input type="file" onChange={(e) => handleFile(e, 'cover')} className="absolute inset-0 opacity-0" />
                    </div>
                    <input type="text" placeholder="제목" value={novelForm.title} onChange={e => setNovelForm({...novelForm, title: e.target.value})} className="w-full border-b border-white/10 py-4 text-xl" />
                    <button onClick={() => { setNovels([{id:Date.now(), ...novelForm, episodes:[]}, ...novels]); setView('home'); }} className="w-full bg-blue-500 py-4 rounded-xl mt-8 font-bold">작품 등록</button>
                </div>
            );

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
