<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Archive</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; margin: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 1rem; overflow: hidden; }
        input, textarea { background: transparent; border: none; outline: none; color: white; width: 100%; }
        .content-img { width: 100%; border-radius: 0.75rem; margin: 1.5rem 0; shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('home');
            const [data, setData] = useState(() => JSON.parse(localStorage.getItem('archive_final_v2') || '[]'));
            const [activeId, setActiveId] = useState(null);
            const [activeEpIdx, setActiveEpIdx] = useState(null);

            const [f, setF] = useState({ t: '', c: null });
            const [e, setE] = useState({ t: '', b: '', imgs: [] });

            useEffect(() => {
                localStorage.setItem('archive_final_v2', JSON.stringify(data));
                if (window.lucide) window.lucide.createIcons();
            }, [data, view]);

            const cur = data.find(i => i.id === activeId);
            const curEp = cur?.eps[activeEpIdx];

            // 삽화 추가 핸들러
            const addIllustration = (ev) => {
                const file = ev.target.files[0];
                if (!file) return;
                const r = new FileReader();
                r.onload = _ => {
                    const imgId = `[IMG_${Date.now()}]`;
                    setE({
                        ...e,
                        b: e.b + `\n${imgId}\n`,
                        imgs: [...(e.imgs || []), { id: imgId, data: _.target.result }]
                    });
                };
                r.readAsDataURL(file);
            };

            // 홈 화면
            if (view === 'home') return (
                <div className="p-6 max-w-md mx-auto">
                    <div className="flex justify-between items-center mb-10">
                        <h1 className="text-xl font-black tracking-widest text-indigo-400">ARCHIVE</h1>
                        <button onClick={() => setView('add')} className="bg-indigo-600 px-4 py-2 rounded-full text-xs font-bold shadow-lg shadow-indigo-500/20">+ NEW STORY</button>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        {data.map(i => (
                            <div key={i.id} onClick={() => { setActiveId(i.id); setView('list'); }} className="active:scale-95 transition-transform">
                                <div className="aspect-[3/4] card mb-2 shadow-xl">{i.c && <img src={i.c} className="w-full h-full object-cover" />}</div>
                                <div className="text-sm font-bold truncate px-1">{i.t}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // 작품 추가
            if (view === 'add') return (
                <div className="p-6 max-w-md mx-auto">
                    <button onClick={() => setView('home')} className="mb-6 opacity-40"><i data-lucide="chevron-left"></i></button>
                    <div className="w-32 aspect-[3/4] card mx-auto mb-8 relative flex items-center justify-center border-dashed border-white/20">
                        {f.c ? <img src={f.c} className="w-full h-full object-cover" /> : <i data-lucide="image" className="opacity-20"></i>}
                        <input type="file" onChange={ev => {
                            const r = new FileReader();
                            r.onload = _ => setF({...f, c: _.target.result});
                            r.readAsDataURL(ev.target.files[0]);
                        }} className="absolute inset-0 opacity-0" />
                    </div>
                    <input placeholder="Story Title" value={f.t} onChange={ev => setF({...f, t: ev.target.value})} className="text-xl border-b border-white/10 py-4 mb-8 font-bold" />
                    <button onClick={() => {
                        if(!f.t) return;
                        setData([{ id: Date.now(), ...f, eps: [] }, ...data]);
                        setF({t:'', c:null}); setView('home');
                    }} className="w-full bg-indigo-600 py-4 rounded-xl font-bold">CREATE</button>
                </div>
            );

            // 회차 목록
            if (view === 'list' && cur) return (
                <div className="max-w-md mx-auto min-h-screen">
                    <div className="p-6 flex gap-5 items-end bg-slate-800/50 backdrop-blur-md sticky top-0 z-10 border-b border-white/5">
                        <div className="w-20 aspect-[3/4] card shrink-0 shadow-2xl">{cur.c && <img src={cur.c} className="w-full h-full object-cover" />}</div>
                        <div className="flex-1 min-w-0">
                            <h2 className="text-xl font-black mb-4 truncate">{cur.t}</h2>
                            <div className="flex gap-2">
                                <button onClick={() => setView('home')} className="bg-white/5 px-4 py-2 rounded-lg text-xs font-bold border border-white/10">BACK</button>
                                <button onClick={() => setView('write')} className="bg-indigo-600 px-4 py-2 rounded-lg text-xs font-bold">WRITE</button>
                            </div>
                        </div>
                    </div>
                    <div className="p-6 space-y-3">
                        {cur.eps.length === 0 && <div className="py-20 text-center opacity-20 text-xs">작성된 회차가 없습니다.</div>}
                        {cur.eps.map((ep, i) => (
                            <div key={ep.id} onClick={() => { setActiveEpIdx(i); setView('read'); }} className="card p-5 flex justify-between items-center active:bg-slate-700 transition-colors">
                                <span className="font-bold text-slate-200">{i+1}. {ep.t}</span>
                                <i data-lucide="chevron-right" size="16" className="opacity-20"></i>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // 회차 작성 (삽화 버튼 추가)
            if (view === 'write') return (
                <div className="p-6 max-w-md mx-auto min-h-screen">
                    <div className="flex justify-between items-center mb-8">
                        <button onClick={() => setView('list')} className="opacity-40"><i data-lucide="x"></i></button>
                        <div className="flex items-center gap-4">
                            <div className="relative overflow-hidden bg-white/10 p-2 rounded-lg">
                                <i data-lucide="image" size="20" className="text-indigo-400"></i>
                                <input type="file" onChange={addIllustration} className="absolute inset-0 opacity-0 cursor-pointer" />
                            </div>
                            <button onClick={() => {
                                if(!e.t || !e.b) return;
                                const next = data.map(i => i.id === activeId ? {...i, eps: [...i.eps, {id: Date.now(), ...e}]} : i);
                                setData(next); setE({t:'', b:'', imgs:[]}); setView('list');
                            }} className="text-indigo-400 font-black">SAVE</button>
                        </div>
                    </div>
                    <input placeholder="Chapter Title" value={e.t} onChange={ev => setE({...e, t: ev.target.value})} className="text-xl font-black mb-6 border-b border-white/5 pb-2" />
                    <textarea placeholder="Write your story... (삽화 버튼을 눌러 중간에 사진을 넣으세요)" value={e.b} onChange={ev => setE({...e, b: ev.target.value})} className="h-[500px] leading-relaxed text-lg resize-none" />
                </div>
            );

            // 읽기 모드 (삽화 렌더링)
            if (view === 'read' && curEp) return (
                <div className="max-w-md mx-auto min-h-screen bg-[#0a0f1d]">
                    <header className="p-4 border-b border-white/5 flex items-center gap-4 sticky top-0 bg-[#0a0f1d]/90 backdrop-blur-md z-10">
                        <button onClick={() => setView('list')} className="opacity-40"><i data-lucide="arrow-left" size="20"></i></button>
                        <h3 className="text-xs font-bold opacity-30 truncate">{curEp.t}</h3>
                    </header>
                    <div className="p-8 pb-32">
                        <div className="text-lg leading-[2.1] font-light text-slate-300 whitespace-pre-wrap">
                            {curEp.b.split(/(\[IMG_\d+\])/).map((part, i) => {
                                const imgMatch = part.match(/\[IMG_(\d+)\]/);
                                if (imgMatch) {
                                    const imgData = curEp.imgs?.find(img => img.id === part);
                                    return imgData ? <img key={i} src={imgData.data} className="content-img" /> : null;
                                }
                                return part;
                            })}
                        </div>
                    </div>
                </div>
            );
            return null;
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
